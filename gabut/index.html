<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Memories</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loader">
      <div class="heart">❤️</div>
      <p>LOADING MEMORIES...</p>
      <div class="progress-bar">
        <div class="progress"></div>
      </div>
    </div>

    <div id="main-content" class="hidden">
      <div class="bg-texts">
        <span>you mean everything</span>
        <span>only you</span>
        <span>always with you</span>
        <span>stay with me</span>
        <span>my safe place</span>
        <span>always on my mind</span>
        <span>forever</span>
        <span>i love you</span>
        <span>my favorite person</span>
        <span>you are enough</span>
      </div>

      <div class="photo-container">
        <img src="foto1.jpg" alt="Foto 1" class="photo active" />
        <img src="foto2.jpg" alt="Foto 2" class="photo" />
        <img src="foto3.jpg" alt="Foto 3" class="photo" />
        <img src="foto4.jpeg" alt="Foto 4" class="photo" />
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
